# Build the bundle and publish the demo to GitHub Pages.
# The demo page loads `../dist/*`, so the built `dist/` (git-ignored) must be
# produced in CI and shipped alongside `demo/`.

name: Deploy demo to GitHub Pages

on:
    push:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

# Allow one concurrent deployment, cancel in-progress runs for the same ref.
concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24.x
                  cache: "npm"

            - run: npm ci
            - run: npm run build

            - name: Configure Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  # Publish the whole project so `demo/` keeps its `../dist`
                  # and `../vendors` relative references.
                  path: "."

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
